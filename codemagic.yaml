workflows:
  m3pay-build:
    name: Build m3pay Android + iOS
    max_build_duration: 120
    instance_type: mac_mini_m2

    environment:
      flutter: "3.41.7"
      xcode: "16.2"

      groups:
        - google_credentials
        - ios_certificates   # add Apple signing here if using CI signing

      vars:
        PACKAGE_NAME: "com.m3pay.app"

    scripts:

      # =========================
      # CLEAN & GET DEPENDENCIES
      # =========================
      - name: Clean project
        script: |
          flutter clean

      - name: Get packages
        script: |
          flutter pub get

      # =========================
      # ANDROID OPTIMIZED BUILD
      # =========================

      - name: Build Android APK (split per ABI optimized)
        script: |
          flutter build apk --release \
          --split-per-abi \
          --tree-shake-icons \
          --obfuscate \
          --split-debug-info=build/debug-info

      - name: Build Android App Bundle (Play Store optimized)
        script: |
          flutter build appbundle --release \
          --tree-shake-icons \
          --obfuscate \
          --split-debug-info=build/debug-info

      # =========================
      # IOS BUILD (INSTALLABLE IPA)
      # =========================

      - name: Install iOS dependencies
        script: |
          cd ios
          pod install
          cd ..

      - name: Build iOS IPA (Ad Hoc / TestFlight)
        script: |
          flutter build ios --release \
          --no-codesign \
          --tree-shake-icons \
          --obfuscate \
          --split-debug-info=build/debug-info

      - name: Create IPA file
        script: |
          mkdir -p build/ios/ipa
          cd build/ios/iphoneos
          zip -r App.ipa Runner.app
          mv App.ipa ../ipa/m3pay.ipa

    artifacts:
      - build/app/outputs/flutter-apk/*.apk
      - build/app/outputs/bundle/release/*.aab
      - build/ios/ipa/*.ipa
      - build/debug-info/**

    publishing:
      email:
        recipients:
          - your@email.com
        notify:
          success: true
          failure: true
